<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g-core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#00B4C4"/>
    </linearGradient>
    <linearGradient id="g-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00F0FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Outer hex glow -->
  <polygon points="32,2 59,18 59,46 32,62 5,46 5,18"
           fill="url(#g-glow)" stroke="none"/>
  <!-- Hex outline -->
  <polygon points="32,2 59,18 59,46 32,62 5,46 5,18"
           fill="#0A0E17" stroke="rgba(0,240,255,0.20)" stroke-width="1.5"/>
  <!-- Inner hex core -->
  <polygon points="32,12 49,22 49,42 32,52 15,42 15,22"
           fill="url(#g-core)" opacity="0.9"/>
  <!-- Center node -->
  <circle cx="32" cy="32" r="4" fill="#0A0E17"/>
  <!-- Connector lines (6 spokes) -->
  <line x1="32" y1="12" x2="32" y2="28" stroke="#0A0E17" stroke-width="1.5" opacity="0.6"/>
  <line x1="49" y1="22" x2="36" y2="29" stroke="#0A0E17" stroke-width="1.5" opacity="0.6"/>
  <line x1="49" y1="42" x2="36" y2="36" stroke="#0A0E17" stroke-width="1.5" opacity="0.6"/>
  <line x1="32" y1="52" x2="32" y2="36" stroke="#0A0E17" stroke-width="1.5" opacity="0.6"/>
  <line x1="15" y1="42" x2="28" y2="36" stroke="#0A0E17" stroke-width="1.5" opacity="0.6"/>
  <line x1="15" y1="22" x2="28" y2="29" stroke="#0A0E17" stroke-width="1.5" opacity="0.6"/>
</svg>
